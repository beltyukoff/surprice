<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей вселенной ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap');

        /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #0b0510;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Прячем стандартный курсор на десктопе, так как у нас свой */
        @media (pointer: fine) { body { cursor: none; } }

        /* --- КАНВАС ФОН (ЧАСТИЦЫ) --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
        }

        /* --- КАСТОМНЫЙ КУРСОР --- */
        #custom-cursor {
            position: fixed; top: 0; left: 0;
            width: 20px; height: 20px;
            border: 2px solid #ff69b4; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 99999;
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            display: none; /* Включится через JS, если это не тачскрин */
        }
        #custom-cursor.hover {
            width: 50px; height: 50px;
            background-color: rgba(255, 105, 180, 0.1);
            backdrop-filter: blur(2px);
        }

        /* --- СТАРТОВЫЙ ЭКРАН --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #2a0825 0%, #05020a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #start-screen h2 {
            font-family: 'Caveat', cursive; font-size: 3.5rem; color: #ffb6c1;
            margin-bottom: 40px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            opacity: 0; animation: fadeInDown 2s forwards 0.5s;
        }
        .core-heart {
            font-size: 6rem; cursor: none;
            filter: drop-shadow(0 0 30px rgba(255, 20, 147, 0.8));
            animation: heartbeat 1.5s infinite; transition: transform 0.3s;
        }
        .core-heart:active { transform: scale(0.8); }
        .tap-text {
            margin-top: 30px; font-weight: 300; font-size: 1rem; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 4px; animation: pulseOpacity 2s infinite;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            position: relative; z-index: 1; display: none; opacity: 0; transition: opacity 2s ease;
        }

        /* Герой-секция */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; position: relative;
        }
        .hero h1 {
            font-family: 'Caveat', cursive; font-size: clamp(4rem, 8vw, 6rem);
            background: linear-gradient(45deg, #ff85b3, #ff1493, #ffb6c1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.3));
            margin-bottom: 20px;
        }
        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; opacity: 0.7;
        }
        .mouse {
            width: 30px; height: 50px; border: 2px solid #ffb6c1; border-radius: 20px; position: relative;
        }
        .wheel {
            width: 4px; height: 8px; background: #ffb6c1; border-radius: 2px;
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            animation: scrollWheel 2s infinite;
        }

        /* --- ТАЙМЛАЙН И КАРТОЧКИ --- */
        .timeline-container {
            max-width: 1000px; margin: 0 auto; padding: 100px 20px; position: relative;
        }
        /* Центральная светящаяся линия */
        .timeline-line {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background: rgba(255, 255, 255, 0.05); transform: translateX(-50%); border-radius: 2px;
        }
        .timeline-line-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 0%; /* Заполняется через JS */
            background: linear-gradient(to bottom, #ff1493, #ff85b3);
            box-shadow: 0 0 20px #ff1493; border-radius: 2px; transition: height 0.5s ease-out;
        }

        .timeline-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 120px; position: relative; width: 100%;
        }
        .timeline-item:nth-child(even) { flex-direction: row-reverse; }

        .timeline-empty { width: 45%; } /* Пустой блок для выравнивания */

        /* Интерактивная 3D карточка */
        .card-wrapper {
            width: 45%; perspective: 1200px; /* Создает глубину для 3D */
        }
        
        .photo-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 25px 15px; border-radius: 12px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            position: relative; transform-style: preserve-3d;
            transition: transform 0.1s; /* Плавность для JS */
            opacity: 0; transform: translateY(100px); /* Для анимации появления */
        }
        .photo-card.visible {
            opacity: 1; transform: translateY(0); transition: opacity 1s, transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Блик света на карточке */
        .glare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 12px; pointer-events: none; z-index: 10;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s; mix-blend-mode: overlay;
        }

        .photo-card img {
            width: 100%; border-radius: 6px; display: block;
            transform: translateZ(30px); /* Фотография "выпирает" вперед в 3D */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); pointer-events: none;
        }
        
        .photo-caption {
            font-family: 'Caveat', cursive; font-size: 2.2rem; text-align: center;
            margin-top: 20px; color: #fff; transform: translateZ(40px); /* Текст еще ближе к зрителю */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: 600;
        }

        /* Точка на таймлайне */
        .timeline-dot {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0);
            width: 20px; height: 20px; border-radius: 50%; background: #0b0510;
            border: 4px solid #ff85b3; box-shadow: 0 0 15px #ff1493; z-index: 2;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .timeline-item.visible .timeline-dot { transform: translate(-50%, -50%) scale(1); }

        /* --- ЛАЙТБОКС (Галерея) --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 2, 8, 0.95); backdrop-filter: blur(20px);
            z-index: 20000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        #lightbox.active { opacity: 1; pointer-events: auto; }
        #lightbox img {
            max-width: 90vw; max-height: 85vh; border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.3);
            transform: scale(0.8) translateY(50px); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #lightbox.active img { transform: scale(1) translateY(0); }
        .close-btn {
            position: absolute; top: 30px; right: 40px; font-size: 50px; color: #fff;
            cursor: none; opacity: 0.7; transition: opacity 0.3s, transform 0.3s;
        }
        .close-btn:hover { opacity: 1; transform: rotate(90deg); }

        /* --- ФИНАЛ И ПЕЧАТНАЯ МАШИНКА --- */
        .final-message {
            text-align: center; padding: 10vh 20px 20vh 20px; position: relative; z-index: 1;
        }
        .final-message h2 {
            font-family: 'Caveat', cursive; font-size: clamp(3rem, 6vw, 4.5rem); color: #ff85b3;
            margin-bottom: 40px; filter: drop-shadow(0 0 20px rgba(255, 133, 179, 0.4));
            opacity: 0; transform: translateY(30px); transition: all 1s;
        }
        .final-message.visible h2 { opacity: 1; transform: translateY(0); }
        
        .typewriter-box {
            max-width: 700px; margin: 0 auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            font-size: 1.3rem; line-height: 1.8; text-align: left; min-height: 200px;
        }
        .cursor-blink {
            display: inline-block; width: 4px; height: 1.2em; background: #ff1493;
            vertical-align: text-bottom; animation: blink 1s infinite;
        }

        /* Кнопка */
        .super-btn {
            margin-top: 50px; padding: 18px 50px; font-size: 1.3rem; font-weight: 600; font-family: 'Montserrat', sans-serif;
            color: #fff; background: linear-gradient(45deg, #ff1493, #ff85b3);
            border: none; border-radius: 50px; cursor: none;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.5);
            opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .super-btn.show { opacity: 1; transform: translateY(0); animation: pulseBtn 2s infinite 1s; }
        .super-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 40px rgba(255, 20, 147, 0.7); }

        /* --- АНИМАЦИИ --- */
        @keyframes fadeInDown { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.2); } 30% { transform: scale(1); } 45% { transform: scale(1.2); } }
        @keyframes pulseOpacity { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes scrollWheel { 0% { top: 10px; opacity: 1; } 100% { top: 30px; opacity: 0; } }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        @keyframes pulseBtn { 0%, 100% { box-shadow: 0 10px 30px rgba(255, 20, 147, 0.5); } 50% { box-shadow: 0 10px 50px rgba(255, 20, 147, 0.8); } }

        /* --- АДАПТИВНОСТЬ (МОБИЛЬНЫЕ) --- */
        @media (max-width: 768px) {
            .timeline-line { left: 30px; }
            .timeline-item { flex-direction: column !important; align-items: flex-end; margin-bottom: 80px; }
            .timeline-empty { display: none; }
            .card-wrapper { width: calc(100% - 60px); }
            .timeline-dot { left: 30px; }
            .typewriter-box { padding: 25px; font-size: 1.1rem; }
            .close-btn { top: 15px; right: 20px; font-size: 40px; }
        }
    </style>
</head>
<body>

    <!-- Аудио -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Кастомный курсор -->
    <div id="custom-cursor"></div>

    <!-- Движок частиц (Фон) -->
    <canvas id="bg-canvas"></canvas>

    <!-- Лайтбокс -->
    <div id="lightbox" onclick="closeLightbox()">
        <div class="close-btn">&times;</div>
        <img id="lightbox-img" src="" alt="">
    </div>

    <!-- Стартовый Экран -->
    <div id="start-screen">
        <h2>Привет, родная...</h2>
        <div class="core-heart hoverable" onclick="startExperience()">❤️</div>
        <div class="tap-text">Дотронься до сердца</div>
    </div>

    <!-- Основной сайт -->
    <div id="main-content">
        <section class="hero">
            <h1>Моей любимой<br>Елизавете ❤️</h1>
            <div class="scroll-indicator">
                <div class="mouse"><div class="wheel"></div></div>
            </div>
        </section>

        <section class="timeline-container" id="timeline">
            <div class="timeline-line"><div class="timeline-line-glow" id="line-glow"></div></div>

            <!-- Фото 1 -->
            <div class="timeline-item">
                <div class="timeline-empty"></div>
                <div class="timeline-dot"></div>
                <div class="card-wrapper">
                    <div class="photo-card hoverable" onclick="openLightbox('photo1.jpg')">
                        <div class="glare"></div>
                        <img src="photo1.jpg" alt="Метро">
                        <div class="photo-caption">С тобой даже в метро уютно...</div>
                    </div>
                </div>
            </div>

            <!-- Фото 2 -->
            <div class="timeline-item">
                <div class="timeline-empty"></div>
                <div class="timeline-dot"></div>
                <div class="card-wrapper">
                    <div class="photo-card hoverable" onclick="openLightbox('photo2.jpg')">
                        <div class="glare"></div>
                        <img src="photo2.jpg" alt="Лифтолук">
                        <div class="photo-caption">Обожаю наши лифтолуки 🤪</div>
                    </div>
                </div>
            </div>

            <!-- Фото 3 -->
            <div class="timeline-item">
                <div class="timeline-empty"></div>
                <div class="timeline-dot"></div>
                <div class="card-wrapper">
                    <div class="photo-card hoverable" onclick="openLightbox('photo3.jpg')">
                        <div class="glare"></div>
                        <img src="photo3.jpg" alt="Каток">
                        <div class="photo-caption">Волшебные моменты на льду ❄️</div>
                    </div>
                </div>
            </div>

            <!-- Фото 4 -->
            <div class="timeline-item">
                <div class="timeline-empty"></div>
                <div class="timeline-dot"></div>
                <div class="card-wrapper">
                    <div class="photo-card hoverable" onclick="openLightbox('photo4.jpg')">
                        <div class="glare"></div>
                        <img src="photo4.jpg" alt="Моська">
                        <div class="photo-caption">Твои моськи — мое искусство 🥰</div>
                    </div>
                </div>
            </div>

            <!-- Фото 5 -->
            <div class="timeline-item">
                <div class="timeline-empty"></div>
                <div class="timeline-dot"></div>
                <div class="card-wrapper">
                    <div class="photo-card hoverable" onclick="openLightbox('photo5.jpg')">
                        <div class="glare"></div>
                        <img src="photo5.jpg" alt="В машине">
                        <div class="photo-caption">Главное — что мы рядом!</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="final-message" id="final-section">
            <h2>Я тебя безумно люблю!</h2>
            <div class="typewriter-box">
                <span id="typed-text"></span><span class="cursor-blink"></span>
            </div>
            <button class="super-btn hoverable" id="kiss-btn" onclick="megaExplosion()">Запустить фейерверк поцелуев 💋</button>
        </section>
    </div>

    <script>
        /* =========================================
           МОДУЛЬ 1: КАСТОМНЫЙ КУРСОР
        ========================================= */
        const cursor = document.getElementById('custom-cursor');
        let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        
        if (!isTouchDevice) {
            cursor.style.display = 'block';
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            let cursorX = mouseX, cursorY = mouseY;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
            });

            // Плавное следование (Интерполяция)
            function animateCursor() {
                let dx = mouseX - cursorX;
                let dy = mouseY - cursorY;
                cursorX += dx * 0.15; // Скорость догоняния
                cursorY += dy * 0.15;
                cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
                
                // Спавн магической пыльцы за курсором
                if(Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                    if(Math.random() > 0.7) spawnTrailParticle(cursorX, cursorY);
                }
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            // Эффект при наведении на кликабельные элементы
            document.querySelectorAll('.hoverable').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        }

        /* =========================================
           МОДУЛЬ 2: 3D КАРТОЧКИ С ОСВЕЩЕНИЕМ
        ========================================= */
        const cards = document.querySelectorAll('.photo-card');
        cards.forEach(card => {
            const glare = card.querySelector('.glare');
            
            card.addEventListener('mousemove', (e) => {
                if(isTouchDevice) return; // На телефоне физика другая
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within the element
                const y = e.clientY - rect.top;  // y position within the element
                
                // Вычисление углов поворота (макс 15 градусов)
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -12;
                const rotateY = ((x - centerX) / centerX) * 12;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                
                // Движение блика
                glare.style.opacity = '1';
                glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.3) 0%, transparent 60%)`;
            });

            card.addEventListener('mouseleave', () => {
                if(isTouchDevice) return;
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                glare.style.opacity = '0';
            });
        });

        /* =========================================
           МОДУЛЬ 3: АНИМАЦИИ ПРИ СКРОЛЛЕ & ТАЙМЛАЙН
        ========================================= */
        const lineGlow = document.getElementById('line-glow');
        
        window.addEventListener('scroll', () => {
            // Заполнение светящейся линии
            let scrollTop = window.scrollY;
            let docHeight = document.body.offsetHeight - window.innerHeight;
            let scrolled = (scrollTop / docHeight) * 100;
            lineGlow.style.height = scrolled + '%';
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    // Если это финальная секция - запускаем машинку
                    if(entry.target.id === 'final-section' && !window.typeStarted) {
                        window.typeStarted = true;
                        setTimeout(typeText, 600);
                    }
                }
            });
        }, { threshold: 0.2 });

        // Отложенный старт слежения, чтобы карточки не появились до нажатия кнопки "Старт"
        function initObserver() {
            document.querySelectorAll('.timeline-item, .photo-card, .final-message').forEach(el => observer.observe(el));
        }

        /* =========================================
           МОДУЛЬ 4: CANVAS ДВИЖОК ЧАСТИЦ (ФИЗИКА)
        ========================================= */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let trailParticles =[];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const emojis = ['❤️', '💖', '✨', '💕', '🌸'];

        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height - height;
                this.size = Math.random() * 15 + 10;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                
                if (isExplosion) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 15 + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.2;
                    this.life = 1.0;
                    this.decay = Math.random() * 0.02 + 0.01;
                } else {
                    this.vx = (Math.random() - 0.5) * 1;
                    this.vy = Math.random() * 2 + 1;
                    this.gravity = 0;
                    this.life = 1;
                    this.decay = 0;
                }
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.rotationSpeed;
                if (this.decay > 0) this.life -= this.decay;
                
                // Перерождение обычных падающих частиц
                if (this.y > height + 50 && this.decay === 0) {
                    this.y = -50; this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.life < 0 ? 0 : this.life;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // Пыльца за курсором
        class TrailParticle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.03;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 105, 180, ${this.life})`;
                ctx.fill();
            }
        }

        function spawnTrailParticle(x, y) {
            trailParticles.push(new TrailParticle(x, y));
        }

        // Создаем фоновые частицы
        for (let i = 0; i < (window.innerWidth < 768 ? 20 : 40); i++) {
            particles.push(new Particle());
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1); i--;
                }
            }
            
            for (let i = 0; i < trailParticles.length; i++) {
                trailParticles[i].update();
                trailParticles[i].draw();
                if (trailParticles[i].life <= 0) {
                    trailParticles.splice(i, 1); i--;
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // Мега Взрыв
        function megaExplosion() {
            const btn = document.getElementById('kiss-btn');
            const rect = btn.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(startX, startY, true));
            }
        }

        /* =========================================
           МОДУЛЬ 5: ЛОГИКА САЙТА (Старт, Текст, Лайтбокс)
        ========================================= */
        function startExperience() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'block';
                setTimeout(() => { 
                    mainContent.style.opacity = '1'; 
                    initObserver(); // Начинаем следить за скроллом
                }, 50);

                const audio = document.getElementById('bg-music');
                audio.volume = 0.5;
                audio.play().catch(e => console.log("Аудио заблокировано"));
            }, 1500);
        }

        // Лайтбокс
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Запрещаем скролл
            if(!isTouchDevice) cursor.style.display = 'none'; // Прячем кастомный курсор
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
            if(!isTouchDevice) cursor.style.display = 'block';
            setTimeout(() => { lightboxImg.src = ''; }, 400);
        }

        // Печатная машинка
        const textMsg = "Лиза, ты делаешь каждый мой день ярче. Спасибо тебе за твою поддержку, за твое чувство юмора и за то, что ты просто есть в моей жизни. Я хочу, чтобы ты всегда была такой же счастливой, красивой и невероятной. Обещаю всегда быть рядом, любить тебя и делать всё, чтобы на твоем лице была улыбка! Твой любимый... ❤️";
        const typedTextSpan = document.getElementById("typed-text");
        let typeIndex = 0;

        function typeText() {
            if (typeIndex < textMsg.length) {
                typedTextSpan.innerHTML += textMsg.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeText, 45); // Скорость печати
            } else {
                setTimeout(() => {
                    document.getElementById('kiss-btn').classList.add('show');
                }, 500);
            }
        }
    </script>
</body>
</html>
