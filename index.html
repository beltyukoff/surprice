<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любимой Елизаветы ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Montserrat:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a0b1c 0%, #3a0d22 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background-attachment: fixed;
            cursor: default; /* Обычный курсор для всего тела */
        }

        /* --- ВОЛШЕБНАЯ ПЫЛЬЦА (ИСКРЫ) --- */
        .sparkle {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: #ffb6c1;
            border-radius: 50%;
            pointer-events: none;
            z-index: 8000;
            box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
            animation: sparkleAnim 0.8s forwards;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* --- СТАРТОВЫЙ ЭКРАН --- */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #110513;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        #start-screen h2 {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: #ff85b3;
            margin-bottom: 20px;
            text-align: center;
        }

        .pulse-heart-btn {
            font-size: 5rem;
            cursor: pointer;
            animation: pulse 1.2s infinite;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .pulse-heart-btn:active {
            transform: scale(0.9);
        }

        #start-screen p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            animation: fadeInOut 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(255, 105, 180, 0.7); }
            50% { transform: scale(1.15); text-shadow: 0 0 40px rgba(255, 105, 180, 1); }
            100% { transform: scale(1); text-shadow: 0 0 0 rgba(255, 105, 180, 0.7); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Главный экран */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Caveat', cursive;
            font-size: 4.5rem;
            color: #ff85b3;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .scroll-down {
            margin-top: 50px;
            font-size: 1.2rem;
            animation: bounce 2s infinite;
            color: #ffb6c1;
        }

        /* Секция с фотографиями (Полароид) */
        .gallery {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 20px;
            position: relative;
            z-index: 1;
        }

        .photo-card {
            background: #fff;
            padding: 15px 15px 30px 15px;
            border-radius: 5px;
            margin-bottom: 80px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(50px) rotate(-3deg);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #333;
            cursor: pointer; /* Показываем, что на фото можно нажать */
        }

        .photo-card:nth-child(even) {
            transform: translateY(50px) rotate(3deg);
        }

        .photo-card.visible {
            opacity: 1;
            transform: translateY(0) rotate(-3deg);
        }

        .photo-card:nth-child(even).visible {
            transform: translateY(0) rotate(3deg);
        }

        .photo-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            z-index: 10;
        }

        .photo-card img {
            width: 100%;
            border-radius: 3px;
            display: block;
            pointer-events: none; /* Чтобы клик срабатывал на карточку */
        }

        .photo-caption {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            text-align: center;
            margin-top: 15px;
            color: #1a0b1c;
            font-weight: 600;
        }

        /* --- ЛАЙТБОКС (Увеличение фото) --- */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 2, 12, 0.9);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none; /* Скрыт по умолчанию */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 5px solid #fff;
        }

        #lightbox .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-family: sans-serif;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- ФИНАЛЬНОЕ СООБЩЕНИЕ И ПЕЧАТНАЯ МАШИНКА --- */
        .final-message {
            text-align: center;
            padding: 50px 20px 100px 20px;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s ease-out;
        }

        .final-message.visible {
            opacity: 1;
            transform: scale(1);
        }

        .final-message h2 {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            color: #ff4d79;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 77, 121, 0.5);
        }

        .final-message p {
            font-size: 1.2rem;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 150px; /* Чтобы блок не прыгал при печати */
            text-align: left; /* Текст машинки красивее смотрится по левому краю */
        }

        .type-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: #ff85b3;
            vertical-align: text-bottom;
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Кнопка-сюрприз */
        .magic-btn {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(45deg, #ff4d79, #ff85b3);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 121, 0.4);
            transition: all 0.3s ease;
            opacity: 0; /* Скрыта пока текст не допечатается */
            pointer-events: none;
        }

        .magic-btn.show {
            opacity: 1;
            pointer-events: auto;
            animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .magic-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 77, 121, 0.6);
        }

        .magic-btn:active {
            transform: translateY(0) scale(0.95);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* Адаптивность для телефонов */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .photo-caption { font-size: 1.8rem; }
            .final-message h2 { font-size: 3rem; }
            .pulse-heart-btn { font-size: 4rem; }
            .photo-card { margin-bottom: 50px; padding: 10px 10px 20px 10px;}
            .final-message p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Скрытый плеер для музыки -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Стартовый экран-интрига -->
    <div id="start-screen">
        <h2>Сюрприз для Лизы...</h2>
        <div class="pulse-heart-btn" onclick="startMagic()">❤️</div>
        <p>Нажми на сердечко</p>
    </div>

    <!-- Лайтбокс (Увеличение фото) -->
    <div id="lightbox" onclick="closeLightbox()">
        <div class="close-btn">&times;</div>
        <img id="lightbox-img" src="" alt="Увеличенное фото">
    </div>

    <!-- Основной сайт -->
    <div id="main-content">
        <div id="hearts-container"></div>

        <section class="hero">
            <h1>Моей любимой<br>Елизавете ❤️</h1>
            <div class="scroll-down">Листай вниз ⬇️</div>
        </section>

        <section class="gallery">
            <div class="photo-card" onclick="openLightbox('photo1.jpg')">
                <img src="photo1.jpg" alt="Мы в метро">
                <div class="photo-caption">С тобой даже в метро уютно...</div>
            </div>

            <div class="photo-card" onclick="openLightbox('photo2.jpg')">
                <img src="photo2.jpg" alt="Лифтолук">
                <div class="photo-caption">Обожаю наши лифтолуки 🤪</div>
            </div>

            <div class="photo-card" onclick="openLightbox('photo3.jpg')">
                <img src="photo3.jpg" alt="Каток">
                <div class="photo-caption">Волшебные моменты на льду ❄️</div>
            </div>

            <div class="photo-card" onclick="openLightbox('photo4.jpg')">
                <img src="photo4.jpg" alt="Забавная моська">
                <div class="photo-caption">Твои моськи — мое искусство 🥰</div>
            </div>

            <div class="photo-card" onclick="openLightbox('photo5.jpg')">
                <img src="photo5.jpg" alt="В машине">
                <div class="photo-caption">Главное — что мы рядом!</div>
            </div>
        </section>

        <section class="final-message" id="final-section">
            <h2>Я тебя безумно люблю!</h2>
            <p>
                <span id="typed-text"></span><span class="type-cursor"></span>
            </p>
            
            <button class="magic-btn" id="kiss-btn" onclick="explodeHearts()">Отправить поцелуй 💋</button>
        </section>
    </div>

    <script>
        // --- 1. Логика стартового экрана и музыки ---
        function startMagic() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'block';
                setTimeout(() => { mainContent.style.opacity = '1'; }, 50);

                const audio = document.getElementById('bg-music');
                audio.volume = 0.5;
                audio.play().catch(e => console.log("Автовоспроизведение аудио заблокировано браузером"));
            }, 1000);
        }

        // --- 2. Волшебная пыльца (Искры за курсором/пальцем) ---
        let lastSparkleTime = 0;
        function createSparkle(e) {
            const now = Date.now();
            if (now - lastSparkleTime < 30) return; // Ограничиваем количество искр для оптимизации
            lastSparkleTime = now;

            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            
            // Определяем координаты (мышь или касание телефона)
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (x === undefined || y === undefined) return;

            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            
            // Рандомный разлет искр
            const tx = (Math.random() - 0.5) * 60 + 'px';
            const ty = (Math.random() - 0.5) * 60 + 'px';
            sparkle.style.setProperty('--tx', tx);
            sparkle.style.setProperty('--ty', ty);
            
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }

        document.addEventListener('mousemove', createSparkle);
        document.addEventListener('touchmove', createSparkle, {passive: true});

        // --- 3. Лайтбокс (Увеличение фото) ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc;
            lightbox.style.display = 'flex';
            // Небольшая задержка для плавного появления
            setTimeout(() => {
                lightbox.style.opacity = '1';
                lightboxImg.style.transform = 'scale(1)';
            }, 10);
        }

        function closeLightbox() {
            lightbox.style.opacity = '0';
            lightboxImg.style.transform = 'scale(0.8)';
            setTimeout(() => {
                lightbox.style.display = 'none';
                lightboxImg.src = ''; // Очищаем
            }, 400);
        }

        // --- 4. Фоновые падающие сердечки ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const hearts =['❤️', '💖', '✨', '💕'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 15 + 10 + 'px';
            document.getElementById('hearts-container').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }
        setInterval(createHeart, 400);

        // --- 5. Эффект печатной машинки + Observer появления ---
        const textMsg = "Лиза, ты делаешь каждый мой день ярче. Спасибо тебе за твою поддержку, за твою улыбку и за то, что ты есть в моей жизни. Я хочу, чтобы ты всегда была такой же счастливой, красивой и невероятной. Обещаю всегда быть рядом и радовать тебя! Твой любимый... ❤️";
        const typedTextSpan = document.getElementById("typed-text");
        let typeIndex = 0;
        let typeStarted = false;

        function typeText() {
            if (typeIndex < textMsg.length) {
                typedTextSpan.innerHTML += textMsg.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeText, 60); // Скорость печати (60мс на букву)
            } else {
                // Когда текст допечатался, плавно показываем кнопку поцелуя
                setTimeout(() => {
                    document.getElementById('kiss-btn').classList.add('show');
                }, 500);
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    
                    // Если мы докрутили до финала и текст еще не начал печататься:
                    if(entry.target.id === 'final-section' && !typeStarted) {
                        typeStarted = true;
                        // Задержка перед началом печати
                        setTimeout(typeText, 800); 
                    }
                }
            });
        }, { threshold: 0.2 });

        setTimeout(() => {
            document.querySelectorAll('.photo-card, .final-message').forEach((el) => {
                observer.observe(el);
            });
        }, 1000);

        // --- 6. Взрыв сердечек по кнопке ---
        function explodeHearts() {
            const container = document.getElementById('hearts-container');
            for(let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.style.position = 'fixed';
                    heart.style.bottom = '10vh';
                    heart.style.left = (30 + Math.random() * 40) + 'vw';
                    heart.style.fontSize = Math.random() * 30 + 20 + 'px';
                    heart.style.zIndex = '9999';
                    
                    const duration = Math.random() * 2 + 1.5;
                    heart.style.transition = `all ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1)`;
                    
                    container.appendChild(heart);

                    setTimeout(() => {
                        heart.style.bottom = '120vh'; 
                        heart.style.left = Math.random() * 100 + 'vw'; 
                        heart.style.opacity = '0';
                        heart.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() * 1.5})`;
                    }, 50);

                    setTimeout(() => { heart.remove(); }, duration * 1000);
                }, i * 25); 
            }
        }
    </script>
</body>
</html>
